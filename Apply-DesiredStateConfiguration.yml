trigger: none

parameters:
- name: environment
  type: string
  default: "Dev"
  
- name: serverGroup
  type: string
  default: "internal"

  
- name: publishPath
  type: string
  default: '$(Build.ArtifactStagingDirectory)/Publish'
  
#######################
variables:
- name: ArtifactName
  value: 'Server DSC Scripts'

- name: DevOpsProjectname
  value: 'Some Cool and Groovy Project'

- name: buildDefinitionNmaeToDeploy
  value: ''

#######################
stages:
- stage: DeployArtifacts
  pool:
    name: common
  jobs:
  - job: Generate
    displayName: 'Generate Artifacts'

    steps:
    - task: PowerShell@2
      displayName: 'Package scripts and configs'
      inputs:
        targetType: 'inline'
        script: |
          New-Item -ItemType Directory -Path '${{ parameters.publishPath }}' -Force
          Copy-Item -Path '$(Build.SourcesDirectory)/Apply-DesiredStateConfiguration.ps1' -Destination '${{ parameters.publishPath }}' -Force
          Copy-Item -Path '$(Build.SourcesDirectory)/Ensure-*.ps1' -Destination '${{ parameters.publishPath }}' -Force
          Copy-Item -Path '$(Build.SourcesDirectory)/MachineConfiguration.json' -Destination '${{ parameters.publishPath }}' -Recurse -Force
  
    - task: PublishPipelineArtifact@2
      displayName: 'Publish Build Artifacts'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
      inputs:
        path: '${{ parameters.publishPath }}'
        artifactName: $(ArtifactName)

- stage: Deploy
  variables:
    - group: ServiceAccounts${{ parameters.environment }}${{ parameters.serverGroup }}
    - workingDirectory: '$(Pipeline.Workspace)/$(Build.DefinitionName)'
  jobs:
  - deployment: Deploy_${{ parameters.environment }}_${{ parameters.serverGroup }}
    workspace:
      clean: all
    displayName: 'Deploy ${{ parameters.environment }}-${{ parameters.serverGroup }}'
    conditions: succeeded()
    environment:
      name: '${{ parameters.environment }}-${{ parameters.serverGroup }}'
      resourceType: VirtualMachine
    strategy:
      rolling:
        maxParallel: 100%
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Build Artifacts'
            inputs:
              project: '$(DevOpsProjectname)'
              buildType: 'specific'
              buildId: '$(Build.BuildId)'
              definition: '$(buildDefinitionNmaeToDeploy)'
              specificBuildWithTriggering: true
              buildVersionToDownload: 'specific'
              allowPartiallySucceededBuilds: false
              allowFailedBuilds: false
              artifactName: $(ArtifactName)
              targetPath: '$(workingDirectory)'

          - task: PowerShell@2
            displayName: 'Download JSON SecureFiles Dynamically via API'
            inputs:
              targetType: 'inline'
              workingDirectory: '$(workingDirectory)'
              script: |
                $ErrorActionPreference = "Stop"
                $certsDir = "Certificates"
                if (-not (Test-Path $certsDir)) { New-Item -ItemType Directory -Path $certsDir | Out-Null }
                
                $configData = Get-Content "MachineConfiguration.json" -Raw | ConvertFrom-Json
                $currentMachine = $env:COMPUTERNAME
                
                $orgUrl = $env:SYSTEM_TEAMFOUNDATIONCOLLECTIONURI
                $projectId = $env:SYSTEM_TEAMPROJECTID
                $token = $env:SYSTEM_ACCESSTOKEN
                
                if (-not $token) { 
                    Write-Error "System.AccessToken is missing. Ensure you map SYSTEM_ACCESSTOKEN: `$(System.AccessToken) and 'Allow scripts to access OAuth token' is enabled." 
                }
                
                $headers = @{ Authorization = "Bearer $token" }
                
                foreach ($block in $configData) {
                    if ($block.TargetMachineNames -contains $currentMachine -and $block.Certificates) {
                        foreach ($cert in $block.Certificates) {
                            $secureFile = $cert.SecureFile
                            Write-Host "Resolving Secure File ID for '$secureFile'..." -ForegroundColor Cyan
                            
                            $lookupUrl = "$orgUrl$projectId/_apis/distributedtask/securefiles?api-version=5.0-preview.1&namePattern=$secureFile"
                            $lookupResponse = Invoke-RestMethod -Uri $lookupUrl -Headers $headers -Method Get
                            
                            if ($lookupResponse.count -eq 0) {
                                Write-Error "Secure File '$secureFile' not found in Azure DevOps project."
                            }
                            
                            $fileId = $lookupResponse.value[0].id
                            
                            Write-Host "Downloading Secure File content to $certsDir..."
                            $downloadUrl = "$orgUrl$projectId/_apis/distributedtask/securefiles/$fileId`?api-version=5.0-preview.1&download=true"
                            $targetPath = Join-Path $certsDir $secureFile
                            Invoke-RestMethod -Uri $downloadUrl -Headers $headers -Method Get -OutFile $targetPath
                            Write-Host "Successfully downloaded to $targetPath" -ForegroundColor Green
                            
                            # Dynamically inject the specific certificate password as an environment variable 
                            # for the downstream script downstream commands to inherit securely.
                            $passKey = $cert.PasswordKey
                            if ($passKey) {
                                Write-Host "Injecting mapped Pipeline Password Secret '$passKey' into downstream environment..." -ForegroundColor Yellow
                                Write-Host "##vso[task.setvariable variable=$passKey;issecret=true]`$($passKey)"
                            }
                        }
                    }
                }
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)

          - task: PowerShell@2
            displayName: 'Replace JSON configuration pipeline tokens'
            inputs:
              targetType: 'filePath'
              filePath: '$(workingDirectory)/Convert-Tokens.ps1'
              arguments: '-TargetPath "$(workingDirectory)/MachineConfiguration.json"'
            env:
              SubstMachineKeyValidationKey: $(SubstMachineKeyValidationKey)
              SubstMachineKeyDecryptionKey: $(SubstMachineKeyDecryptionKey)

          - task: PowerShell@2
            displayName: 'Apply Desired State Configuration'
            inputs:
              targetType: 'filePath'
              filePath: '$(workingDirectory)/Apply-DesiredStateConfiguration.ps1'
              workingDirectory: '$(workingDirectory)'
              arguments: >
                -ConfigurationPath "$(workingDirectory)/MachineConfiguration.json"
                -SvcAccount "$(SvcAccountDomain)\$(SvcAccountName)"
                -SvcAccountPwd "$(SvcAccountPwd)"

          - task: PowerShell@2
            displayName: 'Clean up Certificates Folder'
            condition: always()
            inputs:
              targetType: 'inline'
              workingDirectory: '$(workingDirectory)'
              script: |
                $certsDir = "Certificates"
                if (Test-Path $certsDir) {
                    Write-Host "Cleaning up local Certificates download folder securely..." -ForegroundColor Cyan
                    Remove-Item -Path $certsDir -Recurse -Force
                    Write-Host "Cleanup complete." -ForegroundColor Green
                }
